<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>키워드 검색 스크린샷 수집기</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 p-4 md:p-8 font-sans">
  <div class="max-w-4xl mx-auto space-y-6">
    <!-- Header Banner -->
    <div class="bg-gradient-to-r from-orange-500 to-amber-500 rounded-2xl p-6 text-white shadow-md">
      <h1 class="text-2xl font-bold flex items-center gap-2">📸 키워드 검색 스크린샷 수집기</h1>
      <p class="text-xs text-orange-100 mt-1 font-semibold">로컬 백서버와 연동하여 네이버 및 구글의 특정 키워드 검색 결과를 전체 캡처하고 OCR 체크를 진행합니다.</p>
    </div>
    <!-- Main Controller -->
    <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-200 space-y-4">
      <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">⚙️ 실시간 검색 수집 요청</h2>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-bold text-green-600 mb-1.5">네이버(Naver) 대상 키워드 입력 (줄바꿈/쉼표 구분)</label>
          <textarea id="screenshot-keywords-naver" rows="5" class="w-full px-4 py-3 border border-gray-300 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-orange-500 font-mono" placeholder="예시:&#10;부산인테리어&#10;학원 인테리어"></textarea>
        </div>
        <div>
          <label class="block text-xs font-bold text-blue-600 mb-1.5">구글(Google) 대상 키워드 입력 (줄바꿈/쉼표 구분)</label>
          <textarea id="screenshot-keywords-google" rows="5" class="w-full px-4 py-3 border border-gray-300 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-orange-500 font-mono" placeholder="예시:&#10;부산인테리어 디자인&#10;학원 리모델링 견적"></textarea>
        </div>
      </div>
      <div>
        <label class="block text-xs font-bold text-orange-600 mb-1.5">🎯 OCR 체크 단어 입력 (선택사항, 쉼표 구분)</label>
        <input type="text" id="screenshot-ocr-keywords" class="w-full px-4 py-2 border border-gray-300 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-orange-500" placeholder="예시: 내업체명, mydomain.com (입력 시 이미지 안에서 감지하여 빨간 동그라미 처리)">
      </div>
      <div class="flex justify-between items-center pt-2">
        <div id="screenshot-server-status" class="text-[11px] font-bold text-red-500 flex items-center gap-1">
          <span class="inline-block w-2.5 h-2.5 rounded-full bg-red-500 animate-ping"></span>
          <span>로컬 백서버 통신 상태 확인 중...</span>
        </div>
        <button id="screenshot-start-btn" class="px-6 py-2.5 bg-orange-500 hover:bg-orange-600 text-white rounded-xl text-xs font-bold shadow-sm active:scale-[0.98] transition-all">
          📸 즉시 캡처 시작
        </button>
      </div>
    </div>
    <!-- Scheduling (예약) -->
    <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-200 space-y-4">
      <h3 class="text-sm font-bold text-gray-800">⏰ 매일 지정 시각 자동 수집 설정 (예약 기능)</h3>
      <div id="schedule-tasks-container" class="space-y-4 divide-y divide-gray-100">
        <!-- Dynamic Schedule Cards -->
      </div>
      <div class="flex justify-between items-center pt-2">
        <button id="add-schedule-btn" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-xs font-bold shadow-sm active:scale-[0.98] transition-all">
          ➕ 자동 수집 예약 추가
        </button>
        <button id="schedule-save-btn" class="px-5 py-2.5 bg-gray-850 hover:bg-black text-white rounded-xl text-xs font-bold shadow-sm active:scale-[0.98] transition-all">
          💾 모든 예약 설정 저장
        </button>
      </div>
    </div>
    <!-- Progress Card -->
    <div id="screenshot-result-card" class="hidden bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
      <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
        <h3 class="font-bold text-gray-800 text-sm">📋 작업 진행 내역 및 결과</h3>
        <span id="screenshot-summary" class="text-xs font-bold text-orange-500">대기 중</span>
      </div>
      <div class="p-6 space-y-4">
        <div id="screenshot-progress-list" class="space-y-2 max-h-[300px] overflow-y-auto"></div>
      </div>
    </div>
  </div>
  <script>
    // 로컬 백엔드 주소 확인 및 조립
    function getLocalServerUrl(path) {
      let addr = 'localhost:3888';
      let url = 'http://' + addr;
      return url + (path.startsWith('/') ? path : '/' + path);
    }
    // 대시보드 바인딩 및 AJAX 스크립트
    function setupKeywordScreenshot() {
      const startBtn = document.getElementById("screenshot-start-btn");
      const naverArea = document.getElementById("screenshot-keywords-naver");
      const googleArea = document.getElementById("screenshot-keywords-google");
      const ocrArea = document.getElementById("screenshot-ocr-keywords");
      const statusText = document.getElementById("screenshot-server-status");
      const resultCard = document.getElementById("screenshot-result-card");
      const progressList = document.getElementById("screenshot-progress-list");
      const summary = document.getElementById("screenshot-summary");
      const scheduleSaveBtn = document.getElementById("schedule-save-btn");
      const addScheduleBtn = document.getElementById("add-schedule-btn");
      let serverOnline = false;
      // 스케줄 예약 리스트 로드
      async function loadScheduleConfig() {
        try {
          const res = await fetch(getLocalServerUrl('/api/config'));
          if (res.ok) {
            const data = await res.json();
            if (data.success && data.config) {
              renderSchedules(data.config.schedules || []);
            }
          }
        } catch (e) {
          console.error("스케줄 데이터 로드 에러:", e);
        }
      }
      function renderSchedules(schedules) {
        const container = document.getElementById("schedule-tasks-container");
        container.innerHTML = "";
        if (schedules.length === 0) {
          addScheduleTaskUI({ enabled: false, time: "09:00", naverKeywords: [], googleKeywords: [], ocrKeywords: [] });
        } else {
          schedules.forEach(s => addScheduleTaskUI(s));
        }
      }
      function addScheduleTaskUI(data) {
        const container = document.getElementById("schedule-tasks-container");
        const id = data.id || Math.random().toString(36).substr(2, 9);
        const enabled = !!data.enabled;
        const time = data.time || "09:00";
        const naverKeywords = Array.isArray(data.naverKeywords) ? data.naverKeywords : [];
        const googleKeywords = Array.isArray(data.googleKeywords) ? data.googleKeywords : [];
        const ocrKeywords = Array.isArray(data.ocrKeywords) ? data.ocrKeywords : [];
        const html = `
          <div class="schedule-task-item p-4 bg-gray-50/50 rounded-xl space-y-3 relative pt-8" data-id="${id}">
            <button class="remove-task-btn absolute top-3 right-3 text-red-500 hover:text-red-700 text-xs font-bold">삭제</button>
            <div class="flex items-center justify-between">
              <label class="flex items-center gap-2 text-xs font-bold cursor-pointer">
                <input type="checkbox" class="task-enabled w-4 h-4 text-orange-500" ${enabled ? 'checked' : ''}>
                <span>예약 자동 수집 활성화</span>
              </label>
              <div class="flex items-center gap-1.5">
                <span class="text-xs font-bold">수집 시각:</span>
                <input type="time" class="task-time px-2 py-1 border rounded-lg text-xs font-bold" value="${time}">
              </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
              <div>
                <label class="block text-[11px] font-bold text-green-600 mb-1">네이버 키워드 (줄바꿈/쉼표)</label>
                <textarea class="task-keywords-naver w-full px-3 py-2 border rounded-lg text-[11px] font-mono" rows="2">${naverKeywords.join('\n')}</textarea>
              </div>
              <div>
                <label class="block text-[11px] font-bold text-blue-600 mb-1">구글 키워드 (줄바꿈/쉼표)</label>
                <textarea class="task-keywords-google w-full px-3 py-2 border rounded-lg text-[11px] font-mono" rows="2">${googleKeywords.join('\n')}</textarea>
              </div>
            </div>
            <div>
              <label class="block text-[11px] font-bold text-orange-600 mb-1">OCR 체크 단어 (쉼표 구분)</label>
              <input type="text" class="task-ocr-keywords w-full px-3 py-1.5 border rounded-lg text-[11px]" value="${ocrKeywords.join(', ')}">
            </div>
          </div>
        `;
        const wrapper = document.createElement("div");
        wrapper.className = "py-3";
        wrapper.innerHTML = html;
        wrapper.querySelector(".remove-task-btn").addEventListener("click", () => {
          if (confirm("이 예약을 삭제하시겠습니까?")) wrapper.remove();
        });
        container.appendChild(wrapper);
      }
      if (addScheduleBtn) {
        addScheduleBtn.addEventListener("click", () => {
          addScheduleTaskUI({ enabled: true, time: "09:00", naverKeywords: [], googleKeywords: [], ocrKeywords: [] });
        });
      }
      // 스케줄 설정 저장
      if (scheduleSaveBtn) {
        scheduleSaveBtn.addEventListener("click", async () => {
          if (!serverOnline) { return alert("로컬 백서버가 켜져 있지 않습니다."); }
          const items = document.querySelectorAll(".schedule-task-item");
          const schedules = [];
          for (const item of items) {
            schedules.push({
              id: item.dataset.id,
              enabled: item.querySelector(".task-enabled").checked,
              time: item.querySelector(".task-time").value,
              naverKeywords: item.querySelector(".task-keywords-naver").value.split(/[\n,]/).map(k => k.trim()).filter(k => k),
              googleKeywords: item.querySelector(".task-keywords-google").value.split(/[\n,]/).map(k => k.trim()).filter(k => k),
              ocrKeywords: item.querySelector(".task-ocr-keywords").value.split(',').map(k => k.trim()).filter(k => k)
            });
          }
          try {
            const res = await fetch(getLocalServerUrl('/api/config'), {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ schedules })
            });
            if (res.ok) alert("⏰ 자동 예약 설정이 저장되었습니다!");
          } catch (e) {
            alert("저장 실패: " + e.message);
          }
        });
      }
      // 즉시 수집 시작
      startBtn.addEventListener("click", async () => {
        const naverKeywords = naverArea.value.split(/[\n,]/).map(k => k.trim()).filter(k => k);
        const googleKeywords = googleArea.value.split(/[\n,]/).map(k => k.trim()).filter(k => k);
        const ocrKeywords = ocrArea.value.split(/[\n,]/).map(k => k.trim()).filter(k => k);
        if (naverKeywords.length === 0 && googleKeywords.length === 0) {
          return alert("수집할 키워드를 1개 이상 입력해 주세요.");
        }
        if (!serverOnline) {
          return alert("로컬 수집 서버(screenshot_server.js)가 작동하고 있지 않습니다.");
        }
        resultCard.classList.remove("hidden");
        progressList.innerHTML = "";
        summary.textContent = "캡처 연동 구동 중...";
        startBtn.disabled = true;
        const tasks = [];
        naverKeywords.forEach(k => tasks.push({ keyword: k, platform: 'naver' }));
        googleKeywords.forEach(k => tasks.push({ keyword: k, platform: 'google' }));
        tasks.forEach((task, idx) => {
          const item = document.createElement("div");
          item.id = `ss-item-${idx}`;
          item.className = "flex justify-between items-center p-3 bg-gray-50 rounded-xl border border-gray-150 text-xs font-bold";
          item.innerHTML = `<span>[${task.platform === 'naver' ? '네이버' : '구글'}] ${task.keyword}</span><span class="text-gray-400">대기 중...</span>`;
          progressList.appendChild(item);
        });
        try {
          const res = await fetch(getLocalServerUrl('/api/screenshot'), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ naverKeywords, googleKeywords, ocrKeywords })
          });
          const data = await res.json();
          if (data.success) {
            data.results.forEach((r, idx) => {
              const el = document.getElementById(`ss-item-${idx}`);
              if (el) {
                if (r.success) {
                  el.innerHTML = `<span>[${r.platform === 'naver' ? '네이버' : '구글'}] ${r.keyword}</span><span class="text-green-600">✓ 완료</span>`;
                } else {
                  el.innerHTML = `<span>[${r.platform === 'naver' ? '네이버' : '구글'}] ${r.keyword}</span><span class="text-red-500">✗ 실패 (${r.error})</span>`;
                }
              }
            });
            summary.textContent = "모든 수집 완료";
          }
        } catch (e) {
          summary.textContent = "에러 발생";
          alert("수집 실패: " + e.message);
        } finally {
          startBtn.disabled = false;
        }
      });
      // 로컬 백엔드 서버 상태 주기적 체크
      async function checkServerStatus() {
        try {
          await fetch(getLocalServerUrl('/api/screenshot'), { method: "OPTIONS" });
          serverOnline = true;
          statusText.innerHTML = `<span class="inline-block w-2 h-2 rounded-full bg-green-500"></span><span class="text-green-600 font-bold">로컬 캡처 백서버 연결됨</span>`;
        } catch (e) {
          serverOnline = false;
          statusText.innerHTML = `<span class="inline-block w-2 h-2 rounded-full bg-red-500"></span><span class="text-red-500 font-bold">로컬 백서버 미연결</span>`;
        }
      }
      checkServerStatus();
      setInterval(checkServerStatus, 5000);
      loadScheduleConfig();
    }
    window.addEventListener("load", setupKeywordScreenshot);
  </script>
</body>
</html>
